name: focus360_microservices_alpha

x-common-env: &common-env
  SECRET_KEY: ${SECRET_KEY:-focus360-dev-secret-change-me}
  INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-change-me}
  PYTHONUNBUFFERED: "1"
  GUNICORN_CMD_ARGS: "--timeout 120 --workers 1 --access-logfile - --error-logfile -"

x-service-healthcheck: &service-healthcheck
  test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).status==200 else 1)\""]
  interval: 20s
  timeout: 8s
  retries: 10
  start_period: 30s

services:
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.auth_service
    container_name: focus360-auth-service
    ports: ["8001:8000"]
    environment:
      <<: *common-env
      DATABASE_URL: sqlite:////data/auth_service.db
    volumes: ["focus360_data:/data"]
    networks: [focus360-net]
    restart: unless-stopped
    healthcheck: *service-healthcheck

  tenant-service:
    build:
      context: .
      dockerfile: Dockerfile.tenant_service
    container_name: focus360-tenant-service
    ports: ["8002:8000"]
    environment:
      <<: *common-env
      DATABASE_URL: sqlite:////data/tenant_service.db
    volumes: ["focus360_data:/data"]
    networks: [focus360-net]
    restart: unless-stopped
    healthcheck: *service-healthcheck

  focus-service:
    build:
      context: .
      dockerfile: Dockerfile.focus_service
    container_name: focus360-focus-service
    ports: ["8003:8000"]
    environment:
      <<: *common-env
      DATABASE_URL: sqlite:////data/focus_service.db
    volumes: ["focus360_data:/data"]
    networks: [focus360-net]
    restart: unless-stopped
    healthcheck: *service-healthcheck

  wellness-service:
    build:
      context: .
      dockerfile: Dockerfile.wellness_service
    container_name: focus360-wellness-service
    ports: ["8004:8000"]
    environment:
      <<: *common-env
      DATABASE_URL: sqlite:////data/wellness_service.db
    volumes: ["focus360_data:/data"]
    networks: [focus360-net]
    restart: unless-stopped
    healthcheck: *service-healthcheck

  passport-service:
    build:
      context: .
      dockerfile: Dockerfile.passport_service
    container_name: focus360-passport-service
    ports: ["8005:8000"]
    environment:
      <<: *common-env
      DATABASE_URL: sqlite:////data/passport_service.db
    volumes: ["focus360_data:/data"]
    networks: [focus360-net]
    restart: unless-stopped
    healthcheck: *service-healthcheck

  billing-service:
    build:
      context: .
      dockerfile: Dockerfile.billing_service
    container_name: focus360-billing-service
    ports: ["8006:8000"]
    environment:
      <<: *common-env
      DATABASE_URL: sqlite:////data/billing_service.db
    volumes: ["focus360_data:/data"]
    networks: [focus360-net]
    restart: unless-stopped
    healthcheck: *service-healthcheck

  compliance-service:
    build:
      context: .
      dockerfile: Dockerfile.compliance_service
    container_name: focus360-compliance-service
    ports: ["8007:8000"]
    environment:
      <<: *common-env
      DATABASE_URL: sqlite:////data/compliance_service.db
    volumes: ["focus360_data:/data"]
    networks: [focus360-net]
    restart: unless-stopped
    healthcheck: *service-healthcheck

  locker-service:
    build:
      context: .
      dockerfile: Dockerfile.locker_service
    container_name: focus360-locker-service
    ports: ["8008:8000"]
    environment:
      <<: *common-env
      DATABASE_URL: sqlite:////data/locker_service.db
    volumes: ["focus360_data:/data"]
    networks: [focus360-net]
    restart: unless-stopped
    healthcheck: *service-healthcheck

  registry-service:
    build:
      context: .
      dockerfile: Dockerfile.registry_service
    container_name: focus360-registry-service
    ports: ["8009:8000"]
    environment:
      <<: *common-env
      DATABASE_URL: sqlite:////data/registry_service.db
    volumes: ["focus360_data:/data"]
    networks: [focus360-net]
    restart: unless-stopped
    healthcheck: *service-healthcheck

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: focus360-gateway
    command: gunicorn app:app --bind 0.0.0.0:8000
    ports: ["8080:8000"]
    environment:
      <<: *common-env
      DATABASE_URL: sqlite:////data/gateway.db
      AUTH_URL: http://auth-service:8000
      BILLING_URL: http://billing-service:8000
      COMPLIANCE_URL: http://compliance-service:8000
      FOCUS_URL: http://focus-service:8000
      LOCKER_URL: http://locker-service:8000
      PASSPORT_URL: http://passport-service:8000
      REGISTRY_URL: http://registry-service:8000
      TENANT_URL: http://tenant-service:8000
      WELLNESS_URL: http://wellness-service:8000
    volumes: ["focus360_data:/data"]
    depends_on:
      - auth-service
      - billing-service
      - compliance-service
      - focus-service
      - locker-service
      - passport-service
      - registry-service
      - tenant-service
      - wellness-service
    networks: [focus360-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).status==200 else 1)\""]
      interval: 20s
      timeout: 8s
      retries: 10
      start_period: 40s

  frontend-service:
    build:
      context: ./frontend-service
      dockerfile: Dockerfile
    container_name: focus360-frontend-service
    ports: ["8090:8000"]
    environment:
      SECRET_KEY: ${SECRET_KEY:-focus360-dev-secret-change-me}
      DATABASE_URL: sqlite:////data/frontend_focus360_ai.db
      GATEWAY_URL: http://gateway:8000
      FRONTEND_MODE: frontend-service
      PYTHONUNBUFFERED: "1"
      GUNICORN_CMD_ARGS: "--timeout 120 --workers 1 --access-logfile - --error-logfile -"
    volumes: ["focus360_data:/data"]
    depends_on:
      - gateway
    networks: [focus360-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/login', timeout=5).status==200 else 1)\""]
      interval: 20s
      timeout: 8s
      retries: 10
      start_period: 40s

volumes:
  focus360_data:

networks:
  focus360-net:
    driver: bridge
