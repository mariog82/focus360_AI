services:
  - type: web
    name: focusscuola
    env: python
    buildCommand: "pip install -r requirements.txt && flask --app app init-db"
    startCommand: "gunicorn app:app"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: focusscuola-db
          property: connectionString

databases:
  - name: focusscuola-db
    databaseName: focusscuola
    user: focusscuola
