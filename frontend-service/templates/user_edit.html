{% extends 'base.html' %}{% block content %}
<div class="row justify-content-center"><div class="col-lg-7"><div class="card p-4"><h2>Modifica utente</h2><p class="small-muted">Ruolo: <b>{{u.role}}</b>. Username = email.</p><form method="post" class="row g-2"><div class="col-md-6"><label>Cognome</label><input class="form-control" name="surname" value="{{u.surname or ''}}" required></div><div class="col-md-6"><label>Nome</label><input class="form-control" name="name" value="{{u.name or ''}}" required></div><div class="col-md-8"><label>Email / Username</label><input class="form-control" type="email" name="email" value="{{u.email}}" required></div><div class="col-md-4"><label>Telefono</label><input class="form-control" name="phone" value="{{u.phone or ''}}"></div><div class="col-md-6"><label>Disciplina</label><input class="form-control" name="discipline" value="{{u.discipline or ''}}"></div><div class="col-md-3"><label>Classe</label><input class="form-control" name="class_name" value="{{u.class_name or ''}}"></div><div class="col-md-3"><label>Data nascita</label><input class="form-control" name="birthdate" value="{{u.birthdate or ''}}"></div>{% if plessi %}<div class="col-md-12"><label>Plesso/Sede</label><select class="form-select" name="plesso_id"><option value="">Nessun plesso</option>{% for p in plessi %}<option value="{{p.id}}" {% if u.plesso_id==p.id %}selected{% endif %}>{{p.name}} - {{p.code}}</option>{% endfor %}</select></div>{% endif %}<div class="col-12 form-check ms-2"><input class="form-check-input" type="checkbox" name="active" value="1" {% if u.active %}checked{% endif %}><label class="form-check-label">Utente attivo</label></div><div class="col-12"><button class="btn btn-primary">Salva modifiche</button> <a class="btn btn-outline-secondary" href="/dirigente/users">Annulla</a></div></form></div></div></div>
{% endblock %}
