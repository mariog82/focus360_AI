{% extends 'base.html' %}{% block content %}
<div class="row justify-content-center"><div class="col-md-6"><div class="card p-4">
<h2>Cambio password obbligatorio</h2>
<p class="small-muted">Per sicurezza devi sostituire la password temporanea al primo accesso.</p>
<form method="post">
  <input class="form-control mb-2" type="password" name="new_password" placeholder="Nuova password" required minlength="8">
  <input class="form-control mb-3" type="password" name="confirm_password" placeholder="Conferma password" required minlength="8">
  <button class="btn btn-primary w-100">Aggiorna password</button>
</form>
</div></div></div>
{% endblock %}
