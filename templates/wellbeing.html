{% extends 'base.html' %}{% block content %}<div class="card p-4"><h2>Check-in benessere digitale</h2><form method="post"><label>Stress digitale 1-5</label><input class="form-control mb-2" type="number" min="1" max="5" name="stress_level" value="3"><label>Attenzione percepita 1-5</label><input class="form-control mb-2" type="number" min="1" max="5" name="perceived_attention" value="3"><label>Qualità del sonno 1-5</label><input class="form-control mb-2" type="number" min="1" max="5" name="sleep_quality" value="3"><textarea class="form-control mb-3" name="note" placeholder="Nota opzionale"></textarea><button class="btn btn-primary">Salva</button></form><hr><h4>Ultimi check-in</h4><table class="table"><tr><th>Data</th><th>Stress</th><th>Attenzione</th><th>Sonno</th></tr>{% for s in surveys %}<tr><td>{{s.created_at.date()}}</td><td>{{s.stress_level}}</td><td>{{s.perceived_attention}}</td><td>{{s.sleep_quality}}</td></tr>{% endfor %}</table></div>{% endblock %}
