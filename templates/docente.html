{% extends 'base.html' %}{% block content %}<div class="row"><div class="col-md-5"><div class="card p-3"><h3>Avvia lezione Focus</h3><form method="post"><select class="form-select mb-2" name="class_name">{% for c in classes %}<option>{{c}}</option>{% endfor %}</select><input class="form-control mb-2" name="subject" placeholder="Materia"><input class="form-control mb-2" name="duration" value="60"><button class="btn btn-primary">Genera QR temporaneo</button></form></div></div><div class="col-md-7"><div class="card p-3"><h3>Ultime lezioni</h3><table class="table"><tr><th>Classe</th><th>Materia</th><th>Stato</th><th></th></tr>{% for l in lessons %}<tr><td>{{l.class_name}}</td><td>{{l.subject}}</td><td>{{l.status}}</td><td><a href="/lesson/{{l.id}}">Apri</a></td></tr>{% endfor %}</table></div></div></div>{% endblock %}
