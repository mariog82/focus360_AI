{% extends 'base.html' %}{% block content %}<div class="row"><div class="col-md-4"><div class="card p-3"><h3>Registra phone box</h3><form method="post"><input class="form-control mb-2" name="class_name" placeholder="Classe"><input class="form-control mb-2" name="box_code" placeholder="Codice box/NFC"><select class="form-select mb-2" name="status"><option>libero</option><option>occupato</option><option>manutenzione</option></select><button class="btn btn-primary">Salva</button></form></div></div><div class="col-md-8"><div class="card p-3"><h3>Smart locker / NFC badge</h3><table class="table"><tr><th>Classe</th><th>Box</th><th>Stato</th><th>Aggiornato</th></tr>{% for b in boxes %}<tr><td>{{b.class_name}}</td><td>{{b.box_code}}</td><td>{{b.status}}</td><td>{{b.updated_at}}</td></tr>{% endfor %}</table></div></div></div>{% endblock %}
