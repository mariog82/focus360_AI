{% extends 'base.html' %}{% block content %}
<div class="hero p-4 mb-4"><h1>Modifica plesso</h1><p>Gestione sede/plesso Enterprise/PNRR.</p></div>
<div class="card p-3"><form method="post" class="row g-2"><div class="col-md-4"><label class="form-label">Nome plesso *</label><input class="form-control" required name="name" value="{{plesso.name}}"></div><div class="col-md-2"><label class="form-label">Codice *</label><input class="form-control" required name="code" value="{{plesso.code}}"></div><div class="col-md-3"><label class="form-label">Città *</label><input class="form-control" required name="city" value="{{plesso.city}}"></div><div class="col-md-3"><label class="form-label">Indirizzo *</label><input class="form-control" required name="address" value="{{plesso.address}}"></div><div class="col-md-4"><label class="form-label">Referente</label><input class="form-control" name="referent" value="{{plesso.referent or ''}}"></div><div class="col-md-4"><label class="form-label">Email</label><input class="form-control" type="email" name="email" value="{{plesso.email or ''}}"></div><div class="col-md-3"><label class="form-label">Telefono</label><input class="form-control" name="phone" value="{{plesso.phone or ''}}"></div><div class="col-md-1 d-flex align-items-end"><div class="form-check"><input class="form-check-input" type="checkbox" name="active" value="1" {% if plesso.active %}checked{% endif %}><label class="form-check-label">Attivo</label></div></div><div class="col-12"><button class="btn btn-primary">Salva</button> <a class="btn btn-outline-secondary" href="/plessi">Annulla</a></div></form></div>
{% endblock %}
