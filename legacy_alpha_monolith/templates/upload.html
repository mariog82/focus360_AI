{% extends 'base.html' %}{% block content %}
<div class="row justify-content-center"><div class="col-lg-7"><div class="card p-4"><h2>Upload {{kind}}</h2><p class="small-muted">CSV separato da punto e virgola. Per multi-plesso puoi indicare una sede predefinita o aggiungere nel CSV la colonna <b>plesso</b>/<b>codice_plesso</b>.</p><form method="post" enctype="multipart/form-data">
{% if plessi %}<label class="form-label">Plesso predefinito per gli utenti importati</label><select class="form-select mb-3" name="plesso_id"><option value="">Nessun plesso / usa colonna CSV</option>{% for p in plessi %}<option value="{{p.id}}">{{p.name}} - {{p.code}}</option>{% endfor %}</select>{% endif %}
<input class="form-control mb-3" type="file" name="csvfile" accept=".csv" required><button class="btn btn-primary">Carica CSV</button></form></div></div></div>
{% endblock %}
